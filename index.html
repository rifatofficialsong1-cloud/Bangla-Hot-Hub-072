<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Hot Hub</title>
    <style>
        :root { --red: #E50914; --bg: #141414; }
        body { background: var(--bg); color: white; font-family: Arial; margin: 0; }
        header { padding: 15px; background: rgba(0,0,0,0.8); position: fixed; width: 100%; z-index: 100; box-sizing: border-box; }
        header h1 { color: var(--red); margin: 0; font-size: 24px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 80px 15px 40px; }
        .card { background: #222; border-radius: 4px; overflow: hidden; cursor: pointer; aspect-ratio: 2/3; position: relative; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); width: 100%; padding: 5px; font-size: 12px; text-align: center; }
        #player { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:1000; display:none; flex-direction:column; justify-content:center; }
        .close { position:absolute; top:20px; right:20px; font-size:40px; color:white; cursor:pointer; }
        video { width:100%; }
    </style>
</head>
<body>
    <header><h1>BANGLA HOT HUB</h1></header>
    <div id="video-grid" class="grid"></div>
    <div id="player">
        <span class="close" onclick="closePlayer()">×</span>
        <video id="v" controls></video>
    </div>
    <script>
        const API = 'https://bangla-hot-hub-072.onrender.com';
        async function load() {
            const r = await fetch(`${API}/get_videos`);
            const data = await r.json();
            document.getElementById('video-grid').innerHTML = data.map(v => `
                <div class="card" onclick="play('${v.file_id}')">
                    <img src="${v.thumb}">
                    <div class="card-title">${v.title}</div>
                </div>`).join('');
        }
        function play(id) {
            const p = document.getElementById('player');
            const v = document.getElementById('v');
            p.style.display = 'flex';
            v.src = `${API}/stream/${id}`;
            v.play();
        }
        function closePlayer() {
            const v = document.getElementById('v');
            v.pause();
            document.getElementById('player').style.display = 'none';
        }
        window.onload = load;
    </script>
</body>
</html>
