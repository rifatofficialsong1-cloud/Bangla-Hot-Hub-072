<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Hot Hub</title>
    <style>
        :root { --red: #E50914; --bg: #141414; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial; margin: 0; }
        header { padding: 15px; background: linear-gradient(to bottom, #000, transparent); position: fixed; width: 100%; z-index: 10; }
        header h1 { color: var(--red); margin: 0; font-size: 22px; letter-spacing: -1px; }
        .hero { width: 100%; height: 380px; background: linear-gradient(to top, var(--bg), transparent), url('https://images.unsplash.com/photo-1594782078968-2b07656d7bb2?auto=format&fit=crop&w=800&q=80') center/cover; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 30px; }
        .play-btn { background: white; color: black; border: none; padding: 10px 35px; font-weight: bold; border-radius: 4px; font-size: 18px; cursor: pointer; }
        .section-title { padding: 20px 15px 10px; font-size: 18px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 10px; }
        .card { position: relative; aspect-ratio: 2/3; background: #222; border-radius: 4px; overflow: hidden; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { position: absolute; bottom: 0; padding: 8px 5px; background: linear-gradient(to top, black, transparent); width: 100%; font-size: 11px; font-weight: bold; }
        #player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; justify-content: center; }
        video { width: 100%; }
        .close { position: absolute; top: 20px; right: 20px; font-size: 35px; cursor: pointer; }
    </style>
</head>
<body>
    <header><h1>BANGLA HOT HUB</h1></header>
    <div class="hero"><button class="play-btn">▶ Play</button></div>
    <div class="section-title">Trending Now</div>
    <div id="video-grid" class="grid"></div>

    <div id="player-overlay">
        <span class="close" onclick="closePlayer()">×</span>
        <div id="ad-info" style="text-align:center; padding: 20px;">বিজ্ঞাপন চলছে... ৫ সেকেন্ড</div>
        <video id="main-v" controls style="display:none;"></video>
    </div>

    <script>
        // তোমার Render লিঙ্ক এখানে বসাও (শেষে /get_videos থাকবে)
        const API = 'https://bangla-hot-hub-072.onrender.com/get_videos'; 

        async function load() {
            try {
                const r = await fetch(API);
                const videos = await r.json();
                const g = document.getElementById('video-grid');
                g.innerHTML = videos.map(v => `
                    <div class="card" onclick="play('${v.file_id}')">
                        <img src="${v.thumb}">
                        <div class="card-title">${v.title}</div>
                    </div>`).join('');
            } catch(e) { console.log("বট অফলাইন"); }
        }

        function play(id) {
            const ov = document.getElementById('player-overlay');
            ov.style.display = 'flex';
            setTimeout(() => {
                document.getElementById('ad-info').style.display = 'none';
                const v = document.getElementById('main-v');
                v.style.display = 'block';
                // ভিডিওর সোর্স ফাইল আইডি দিয়ে প্লে হবে (বটের সাথে কানেক্টেড থাকতে হবে)
                v.src = "https://your-streaming-link.com/" + id; 
                v.play();
            }, 5000);
        }

        function closePlayer() { 
            location.reload(); // রিসেট করার জন্য সহজ উপায়
        }
        window.onload = load;
    </script>
</body>
</html>
