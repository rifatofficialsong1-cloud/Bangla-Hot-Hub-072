<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Hot Hub</title>
    <style>
        :root { --red: #E50914; --bg: #141414; }
        body { background: var(--bg); color: white; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Header */
        header { padding: 15px 4%; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); position: fixed; width: 100%; z-index: 100; box-sizing: border-box; }
        header h1 { color: var(--red); margin: 0; font-size: 24px; letter-spacing: -1px; font-weight: 900; }

        /* Hero Section */
        .hero { width: 100%; height: 70vh; background: linear-gradient(to top, var(--bg), transparent), url('https://images.unsplash.com/photo-1626814026160-2237a95fc5a0?q=80&w=1000') center/cover; display: flex; align-items: flex-end; padding: 0 4% 40px; box-sizing: border-box; }
        .hero-content h2 { font-size: 32px; margin-bottom: 15px; }
        .play-btn { background: white; color: black; border: none; padding: 10px 25px; font-weight: bold; border-radius: 4px; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; }

        /* Video Grid */
        .section-title { padding: 20px 4% 10px; font-size: 18px; font-weight: bold; color: #e5e5e5; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; padding: 0 4% 40px; }
        .card { position: relative; aspect-ratio: 2/3; background: #222; border-radius: 4px; overflow: hidden; transition: transform 0.3s; cursor: pointer; }
        .card:hover { transform: scale(1.05); z-index: 2; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-title { position: absolute; bottom: 0; padding: 10px 5px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); width: 100%; font-size: 11px; font-weight: bold; text-align: center; box-sizing: border-box; }

        /* Player Overlay */
        #player-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; justify-content: center; }
        .close-btn { position: absolute; top: 20px; right: 20px; font-size: 35px; color: white; cursor: pointer; z-index: 1001; }
        video { width: 100%; max-height: 80vh; }
        .ad-timer { text-align: center; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <header><h1>BANGLA HOT HUB</h1></header>

    <div class="hero">
        <div class="hero-content">
            <h2>Unlimited Movies & More</h2>
            <button class="play-btn">▶ Play</button>
        </div>
    </div>

    <div class="section-title">বটে আপলোড করা ভিডিওসমূহ</div>
    <div id="video-grid" class="grid">
        <p id="loading-msg" style="padding: 20px; color: #888;">ভিডিও লোড হচ্ছে...</p>
    </div>

    <div id="player-overlay">
        <span class="close-btn" onclick="closePlayer()">×</span>
        <div id="ad-box">
            <p class="ad-timer">বিজ্ঞাপন চলছে... <span id="seconds">5</span> সেকেন্ড</p>
        </div>
        <video id="main-video" controls style="display:none;"></video>
    </div>

    <script>
        // তোমার আসল Render লিঙ্কটি এখানে বসিয়ে দিয়েছি
        const API_URL = 'https://bangla-hot-hub-072.onrender.com/get_videos'; 

        async function loadVideos() {
            try {
                const response = await fetch(API_URL);
                const videos = await response.json();
                const grid = document.getElementById('video-grid');
                
                if (videos.length === 0) {
                    grid.innerHTML = '<p style="padding: 20px; color: #888;">বটে এখনো কোনো ভিডিও আপলোড করা হয়নি।</p>';
                    return;
                }

                grid.innerHTML = ''; // লোডিং মেসেজ সরিয়ে ফেলা
                videos.forEach(video => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.onclick = () => openPlayer(video.file_id);
                    card.innerHTML = `
                        <img src="${video.thumb}" alt="${video.title}">
                        <div class="card-title">${video.title}</div>
                    `;
                    grid.appendChild(card);
                });
            } catch (error) {
                document.getElementById('loading-msg').innerText = "বট সার্ভার কানেক্ট করা যাচ্ছে না!";
                console.error("Error:", error);
            }
        }

        function openPlayer(fileId) {
            const overlay = document.getElementById('player-overlay');
            const adBox = document.getElementById('ad-box');
            const videoElement = document.getElementById('main-video');
            const timerSpan = document.getElementById('seconds');
            
            overlay.style.display = 'flex';
            let timeLeft = 5;

            const timer = setInterval(() => {
                timeLeft--;
                timerSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    adBox.style.display = 'none';
                    videoElement.style.display = 'block';
                    // দ্রষ্টব্য: টেলিগ্রাম ফাইল আইডি সরাসরি ভিডিও ট্যাগ সাপোর্ট করে না। 
                    // এটি কাজ করানোর জন্য আপনার একটি স্ট্রিমিং লিঙ্ক লাগবে।
                    videoElement.src = "https://your-streaming-proxy.com/file/" + fileId; 
                    videoElement.play();
                }
            }, 1000);
        }

        function closePlayer() {
            const videoElement = document.getElementById('main-video');
            videoElement.pause();
            videoElement.src = "";
            location.reload(); 
        }

        // পেজ লোড হলে ভিডিওগুলো নিয়ে আসবে
        window.onload = loadVideos;
    </script>
</body>
</html>
